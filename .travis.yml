language: python

python:
- 3.9

env:
  global:
    - PIPENV_VENV_IN_PROJECT=1
    - PIPENV_IGNORE_VIRTUALENVS=1

install:
- pip install -q pipenv
- pipenv sync --dev
- cp contrib/env-sample .env

script:
- pipenv run flake8
- pipenv run pytest --cov=pypro

branches:
  only:
  - main

after_success:
- pipenv run codecov
